name: docker-build-and-push

on:
  workflow_dispatch:
  push:
    paths:
      - src/**
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # 2) Compute a short SHA in shell and place it into the job env
      - name: Set SHORT_SHA
        shell: bash
        run: |
          echo "Generating commit id..."
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "The commit id is ${SHORT_SHA} " 

      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: gnampoothi/python-app:${env.SHORT_SHA}